<script>
        // Micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const loginForm = document.getElementById('loginForm');

            // Password Visibility Toggle
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                const icon = togglePassword.querySelector('.material-symbols-outlined');
                icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });

            // Button loading state simulation
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = loginForm.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                
                btn.disabled = true;
                btn.innerHTML = `
                    <span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span>
                    <span>Verificando...</span>
                `;

                const role = await verificar_login();

                if (role) {
                    btn.innerHTML = `
                        <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                        <span>Acceso Concedido</span>
                    `;
                    btn.classList.remove('bg-secondary');
                    btn.classList.add('bg-forest-accent');

                    // Redirección basada en rol
                    setTimeout(() => {
                        // Guardamos el rol en la sesión para usarlo en otras páginas
                        sessionStorage.setItem('userRole', role);
                        
                        if (role === 'viewer' || role === 'Estudiante') {
                            window.location.href = 'sections/index.html';
                        } else if (role === 'admin' || role === 'Administrador' || role === 'supervisor') {
                            window.location.href = 'admin.html';
                        } else {
                            alert("Rol no reconocido: " + role);
                            location.reload();
                        }
                    }, 1000);
                } else {
                    alert("Correo o contraseña incorrectos");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('bg-forest-accent');
                    btn.classList.add('bg-secondary');
                }
            });

            // Smooth parallax for background elements
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                const background = document.querySelector('.glass-background');
                background.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
            });
        });
    </script>
