<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link rel="shortcut icon" href="./sections/assets/favicon.png" type="image/x-icon">
  <title>Login | Lab Virtual GeoCiencias</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f6fafe; }
    .glass-card { 
      background: rgba(255, 255, 255, 0.8); 
      backdrop-filter: blur(8px); 
      border: 1px solid rgba(226, 232, 240, 0.7); 
      border-radius: 1.5rem; 
    }
    .glass-background {
      background: radial-gradient(circle at top left, #c2e8ff 0%, transparent 40%),
                  radial-gradient(circle at bottom right, #8fd8ff 0%, transparent 40%);
      opacity: 0.4;
    }
  </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

<!-- Pantalla de Carga -->
<div id="loading-screen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-[#f6fafe] transition-opacity duration-500">
    <div class="flex flex-col items-center gap-4">
      <div class="w-16 h-16 border-4 border-[#2c7da0] border-t-transparent rounded-full animate-spin"></div>
      <div class="flex items-center gap-2 text-[#0b3b4f] font-bold text-lg">
        <i class="fas fa-flask animate-pulse"></i>
        <span>Iniciando Sistema...</span>
      </div>
    </div>
</div>

<!-- Atmospheric Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 glass-background"></div>
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-[#c1e8ff] opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[5%] w-96 h-96 bg-[#c2e8ff] opacity-20 blur-[120px] rounded-full"></div>
</div>

<main class="relative z-10 w-full max-w-[480px]">
    <!-- Encabezado Institucional -->
    <div class="mb-10 text-center">
      <div class="flex items-center justify-center gap-2 text-sm font-semibold text-[#0f4c5f] mb-3">
        <i class="fas fa-shield-halved text-[#2c7da0]"></i>
        <span>Acceso Seguro</span>
        <i class="fas fa-microscope"></i>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#0b3b4f] to-[#1e6f5c] bg-clip-text text-transparent">
        Laboratorio Virtual de Geociencias
      </h1>
      <p class="text-gray-600 mt-2 font-medium">Escuela de Petróleo y Gas · UNIOJEDA</p>
      <div class="h-1 w-20 bg-gradient-to-r from-[#2c7da0] to-[#61a5c2] rounded-full mt-4 mx-auto"></div>
    </div>

    <!-- Login Card -->
    <div class="glass-card p-8 md:p-10 shadow-2xl border border-white/50">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-[#0b3b4f]">Inicio de Sesión</h2>
        <p class="text-slate-500 text-sm mt-1">Ingresa tus credenciales institucionales</p>
      </div>

      <form id="loginForm" class="space-y-6" onsubmit="handleLogin(event)">
        <div>
          <label for="email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Correo Electrónico</label>
          <div class="relative group">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#2c7da0] transition-colors"></i>
            <input type="email" id="email" name="email" required
              class="w-full pl-11 pr-4 py-3.5 bg-white rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-[#2c7da0]/20 focus:border-[#2c7da0] transition-all"
              placeholder="usuario@dominio.com">
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label for="password" class="text-xs font-bold text-slate-500 uppercase tracking-wider">Contraseña</label>
            <a href="#" class="text-xs font-semibold text-[#2c7da0] hover:underline">¿Olvidaste tu contraseña?</a>
          </div>
          <div class="relative group">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#2c7da0] transition-colors"></i>
            <input type="password" id="password" name="password" required
              class="w-full pl-11 pr-12 py-3.5 bg-white rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-[#2c7da0]/20 focus:border-[#2c7da0] transition-all"
              placeholder="••••••••">
            <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <input type="checkbox" id="remember-me" class="w-5 h-5 rounded-lg border-slate-300 text-[#2c7da0] focus:ring-[#2c7da0]/20 cursor-pointer">
          <label for="remember-me" class="text-sm text-slate-600 font-medium cursor-pointer select-none">Mantener sesión iniciada</label>
        </div>

        <button type="submit" id="submitBtn"
          class="w-full py-4 bg-[#0b3b4f] hover:bg-[#0f4c5f] text-white rounded-2xl font-bold shadow-lg shadow-[#0b3b4f]/20 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
          <span>Acceder al Laboratorio</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>

    <footer class="mt-8 text-center">
      <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">UNIOJEDA © 2026</p>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
        // Micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            // Ocultar pantalla de carga cuando todo esté listo
            window.addEventListener('load', () => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.classList.add('opacity-0', 'pointer-events-none');
                    setTimeout(() => loader.remove(), 500);
                }
            });

            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');

            // Password Visibility Toggle
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                const icon = togglePassword.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });

            // Button loading state simulation
            loginForm.addEventListener('submit', (e) => {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Verificando...';
            });

            // Smooth parallax for background elements
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                const background = document.querySelector('.glass-background');
                background.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
            });
        });
    </script>
</body></html>
